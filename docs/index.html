<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TRMNL Dashboard Recipes</title>
    <link rel="stylesheet" href="./assets/dashboard.css">
    <script src="./assets/trmnl-component.js" defer="defer"></script>
    <script src="./assets/dashboard.js" defer="defer"></script>
    <meta property="og:image" content="./assets/opengraph.png">
  </head>
  <body>
    <main>
      <h1 class="hidden">Stephen Yeargin's TRMNL Plugins</h1>
      <trmnl-frame color="white" aria-label="Selected recipe preview"></trmnl-frame>
      <div id="status" aria-live="polite"></div>
      <section id="table-panel" aria-label="Recipe statistics table">
        <div id="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Recipe</th>
                <th>Installs</th>
                <th>Forks</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="recipes-body"></tbody>
          </table>
        </div>
      </section>
      <div id="credit">
        <a href="https://social.yearg.in/@stephenyeargin" rel="me">@stephenyeargin@yearg.in</a>
        <span> | </span>
        <a href="https://stephenyeargin.com" rel="me">stephenyeargin.com</a>
      </div>
    </main>
  </body>
</html>
